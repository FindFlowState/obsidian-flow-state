name: Release Obsidian Plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Remove local-only dependency
        # @flowstate/supabase-types is a monorepo-local types package.
        # All imports are `import type` (erased by esbuild), so it is not
        # needed at build time — only for IDE type-checking in the monorepo.
        run: npm pkg delete dependencies.@flowstate/supabase-types

      - name: Install dependencies
        run: npm install

      - name: Build plugin
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          INGEST_EMAIL_DOMAIN: ${{ secrets.INGEST_EMAIL_DOMAIN }}
          SENTRY_DSN_OBSIDIAN: ${{ secrets.SENTRY_DSN_OBSIDIAN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          # build.mjs reads .env.prod from resolve(projectRoot, '..', '..') where
          # projectRoot = scripts/.. = checkout root. So it looks at ../../.env.prod.
          mkdir -p ../../
          cat > ../../.env.prod <<EOF
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          INGEST_EMAIL_DOMAIN=${INGEST_EMAIL_DOMAIN}
          SENTRY_DSN_OBSIDIAN=${SENTRY_DSN_OBSIDIAN}
          SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}
          ENV=prod
          EOF
          # Strip leading whitespace from env file (heredoc indentation)
          sed -i 's/^[[:space:]]*//' ../../.env.prod
          node scripts/build.mjs --mode=prod

      - name: Verify build output
        run: |
          test -f dist/prod/main.js || { echo "main.js not found"; exit 1; }
          test -f dist/prod/manifest.json || { echo "manifest.json not found"; exit 1; }

      - name: Attest build artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/prod/main.js
            dist/prod/manifest.json

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            dist/prod/main.js \
            dist/prod/manifest.json \
            --title "$tag" \
            --generate-notes
